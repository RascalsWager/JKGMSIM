name: Build Jester King GM Simulator APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Confirm Java version
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            python3 \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            build-essential

      - name: Install Buildozer tools
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade buildozer cython virtualenv

      - name: Verify project files and API settings
        run: |
          pwd
          ls -la
          test -f main.py
          test -f buildozer.spec
          echo "----- buildozer.spec Android settings -----"
          grep -n "android.api\\|android.minapi\\|android.ndk_api\\|android.ndk\\|android.archs" buildozer.spec

      - name: Hard clean old Buildozer cache
        run: |
          rm -rf .buildozer
          rm -rf bin
          rm -rf ~/.buildozer

      - name: Build debug APK
        run: |
          buildozer -v android debug

      - name: List APK output
        run: |
          find bin -type f -name "*.apk" -print

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jester-king-gm-simulator-apk
          path: bin/*.apk
          if-no-files-found: error
